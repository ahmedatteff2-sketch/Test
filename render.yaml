services:
  # Single merged service: the Go server serves the embedded Next.js static
  # export AND the /api routes from one origin. Built from the repo Dockerfile
  # (Node builds the front-end to a static export, Go embeds it into the binary).
  # See apps/api/cmd/server/main.go and apps/api/internal/web.
  - type: web
    name: eagle-coaching
    runtime: docker
    dockerfilePath: ./Dockerfile
    # PORT is injected by Render and read by the app (config.Load); don't pin it.
    envVars:
      # PostgreSQL connection string from Supabase (Project → Connect → use the
      # "Session pooler" string, it's IPv4 — Render needs IPv4 outbound).
      # NOTE: the app currently runs on in-memory demo data and does not yet open
      # a DB connection, so this only needs to be non-empty to pass the
      # production config check. Set it for real when the DB layer is wired up.
      - key: DATABASE_URL
        sync: false
      - key: JWT_PRIVATE_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      # The browser is now same-origin with /api, so CORS isn't exercised in the
      # browser; this is still required to be non-empty in production
      # (validateProductionConfig). Set it to this service's own public URL.
      - key: ALLOWED_ORIGINS
        value: https://eagle-coaching.onrender.com
      - key: ADMIN_EMAIL
        value: admin@eagle.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLIENT_EMAIL
        value: client@eagle.com
      - key: CLIENT_PASSWORD
        sync: false
      # Optional: comma-separated upstream proxy IPs/CIDRs whose X-Forwarded-For
      # header is trusted, so the login/global rate limiters key on the real
      # client IP without being spoofable. Set to Render's load-balancer range.
      # Leave unset to trust the forwarded header without validation.
      # - key: TRUSTED_PROXIES
      #   sync: false

# No `databases:` block — PostgreSQL is hosted on Supabase, not Render. Set the
# DATABASE_URL env var above from your Supabase project's connection string.
