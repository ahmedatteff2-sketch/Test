services:
  # 1. Go API Backend Service
  - type: web
    name: eagle-coaching-api
    env: go
    buildCommand: cd apps/api && go build -o main cmd/server/main.go
    startCommand: cd apps/api && ./main
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: eagle-coaching-db
          property: connectionString
      - key: JWT_PRIVATE_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://eagle-coaching-web.onrender.com
      - key: ADMIN_EMAIL
        value: admin@eagle.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLIENT_EMAIL
        value: client@eagle.com
      - key: CLIENT_PASSWORD
        sync: false
      # Optional: comma-separated upstream proxy IPs/CIDRs whose X-Forwarded-For
      # header is trusted, so the login/global rate limiters key on the real
      # client IP without being spoofable. Set to Render's load-balancer range.
      # Leave unset to trust the forwarded header without validation.
      # - key: TRUSTED_PROXIES
      #   sync: false

  # 2. Next.js Frontend Web Service
  - type: web
    name: eagle-coaching-web
    env: node
    buildCommand: cd apps/web && npm install && npm run build
    startCommand: cd apps/web && npm run start
    envVars:
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        value: https://eagle-coaching-api.onrender.com/api

databases:
  # 3. PostgreSQL Database
  - name: eagle-coaching-db
    databaseName: coaching
    user: coaching_user
